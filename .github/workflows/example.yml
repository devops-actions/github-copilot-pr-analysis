name: PR Analysis Example
on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      output_format:
        description: 'Output format (json or csv)'
        required: false
        default: 'json'
        type: choice
        options:
          - json
          - csv
      clean_cache:
        description: 'Clean cache and start fresh'
        required: false
        default: 'false'
        type: boolean
  push:
    paths:
      - .github/workflows/example.yml

permissions:
  contents: read

jobs:
  analyze-prs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Validate GitHub token
        run: |
          if [ -z "${{ secrets.GH_PAT }}" ]; then
            echo "::error::GH_PAT secret is not set. Please add a GitHub Personal Access Token to your repository secrets."
            exit 1
          fi
      
      - name: Restore HTTP cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .http_cache
          key: http-cache-${{ github.run_id }}
          restore-keys: |
            http-cache-
      
      - name: Run PR analysis with charts
        uses: devops-actions/github-copilot-pr-analysis@a32a2170ed15148dada014bd200a9ee68f922a8c # v0.0.6
        with:
          github_token: ${{ secrets.GH_PAT }}
          output_format: ${{ inputs.output_format || 'json' }}
          analyze_all_repos: 'true'
          clean_cache: ${{ inputs.clean_cache || 'false' }}
          # Optional: Skip specific organizations or selectively include repos
          # skipped_orgs: |
          #   unwanted-org
          #   partial-org:include:repo1,repo2
      
      - name: Upload analysis results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: pr-analysis-results-${{ github.run_number }}
          path: report/pr_analysis_*
          retention-days: 30
      
      - name: Display results summary
        if: always()
        run: |
          {
            echo "## Analysis Complete! 🎉"
            echo ""
            echo "Analysis results have been uploaded as artifacts."
            echo "Check the charts and tables in the step summary above."
          } >> "$GITHUB_STEP_SUMMARY"
